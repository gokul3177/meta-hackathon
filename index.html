<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduler RL Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .queue-container {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            min-height: 150px;
        }

        .task-card {
            min-width: 160px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 1rem;
            position: relative;
            transition: transform 0.2s;
        }

        .task-card:hover { transform: translateY(-5px); }

        .priority-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--secondary);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-step { background: var(--primary); color: white; }
        .btn-reset { background: rgba(255,255,255,0.1); color: white; }
        button:hover { opacity: 0.9; transform: scale(0.98); }

        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 1.5rem;">CPU Scheduler RL</h1>
            <div id="connection-status" style="font-size: 0.8rem; color: #4ade80;">● ONLINE</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div style="font-size: 0.8rem; opacity: 0.6;">TIME</div>
                <div class="stat-value" id="current-time">0</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8rem; opacity: 0.6;">REWARD</div>
                <div class="stat-value" id="total-reward">0.00</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8rem; opacity: 0.6;">AVG WAIT</div>
                <div class="stat-value" id="avg-wait">0.0</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8rem; opacity: 0.6;">COMPLETED</div>
                <div class="stat-value" id="completed">0</div>
            </div>
        </div>

        <h3 style="margin-bottom: 1rem; opacity: 0.8; font-weight: 400;">Current Queue</h3>
        <div class="queue-container" id="queue">
            <!-- Tasks will appear here -->
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="reset()">RESET SYSTEM</button>
            <button class="btn-step" onclick="step()">EXECUTE STEP</button>
        </div>
    </div>

    <script>
        async function updateUI() {
            const res = await fetch('/state');
            const data = await res.json();
            const state = data.state;

            document.getElementById('current-time').innerText = state.current_time;
            document.getElementById('total-reward').innerText = state.total_reward.toFixed(2);
            document.getElementById('avg-wait').innerText = state.avg_waiting_time.toFixed(1);
            document.getElementById('completed').innerText = state.finished_tasks.length;

            const queueEl = document.getElementById('queue');
            queueEl.innerHTML = '';
            
            state.task_queue.forEach((task, index) => {
                const progress = (1 - (task.remaining_time / task.burst_time)) * 100;
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div class="priority-badge">P${task.priority}</div>
                    <div style="font-size: 0.8rem; opacity: 0.6;">Task ID: ${task.task_id}</div>
                    <div style="margin: 0.5rem 0; font-weight: 600;">Rem: ${task.remaining_time}u</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                `;
                card.onclick = () => step(index);
                queueEl.appendChild(card);
            });
        }

        async function step(idx = 0) {
            await fetch('/step', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task_index: idx})
            });
            updateUI();
        }

        async function reset() {
            await fetch('/reset', { method: 'POST' });
            updateUI();
        }

        updateUI();
        setInterval(updateUI, 2000); // Poll every 2s
    </script>
</body>
</html>
